# Transductive downstream evaluation grid (run_downstream_eval_grid_transductive.py)
# TRANSDUCTIVE SETTING: Uses a single large graph with train/val/test node masks
# Run from repo root, e.g.:
#   python downstream_adaptation/run_downstream_eval_grid_transductive.py --config downstream_adaptation/grid_configs/grid_transductive.yaml

run_dirs: data\outputs\wandb\run-20260403_104221-8kbmcrdo
wandb_pretrain_project: null #graphmaev2_grid_transductive

fetch_filters:
  state: finished
min_runs: 1

modes:
  - linear-probe
  - random-init-linear-probe

# Few-shot: set n_train to a list, e.g. [20, 30, 50]. null = use full training split from dataset config.
n_train: [20]
n_evaluation: 500
data_seed: 0

# Optional GraphUniverse overrides (same semantics as inductive grid).
graphuniverse_overrides:
  - null

epochs: 200
lr: [0.001]
patience: 20
classifier_dropout: [0.0, 0.2]
input_dropout: null
device: cuda:0
# Max concurrent jobs; each uses a distinct GPU (see eval_devices). 1 = sequential.
parallel_workers: null
eval_devices: null
seed: 42
wandb_project: test_transd
save_results: true
confirm_before_run: true
# Number of times to repeat each experiment with different train/val splits (same graph, same test set) for computing std (default: 1)
# TRANSDUCTIVE: Each repeat uses the same graph but different train/val node splits (test set fixed)
repeat_on_different_split_seed: 3
