# @package _global_

# Bootstrapped Graph Latent Representation Learning (BGRL) Configuration
# Self-supervised learning via bootstrapping

pretraining:
  enabled: true
  task: bgrl
  transform_suffix: _bgrl

# BGRL needs its own wrapper (EMA online/target encoders) and readout (predictor MLP).
# Residual connections must be off — the wrapper returns a multi-key dict, not a plain x_0 tensor.
model:
  backbone_wrapper:
    wrapper_name: BGRLGNNWrapper
    residual_connections: false
  readout:
    readout_name: BGRLReadOut
    hidden_dim: ${model.feature_encoder.out_channels}
    out_channels: ${model.feature_encoder.out_channels}  # predictor projects to same dim as encoder
    task_level: ${dataset.parameters.task_level}
    pooling_type: sum

# Override loss and evaluator
loss:
  _target_: topobench.loss.TBLoss
  dataset_loss:
    _target_: topobench.loss.dataset.BGRLLoss
  modules_losses:
    feature_encoder: ${oc.select:model.feature_encoder.loss,null}
    backbone: ${oc.select:model.backbone.loss,null}
    readout: ${oc.select:model.readout.loss,null}

evaluator:
  _target_: topobench.evaluator.bgrl_evaluator.BGRLEvaluator
  metrics:
    - loss
    - loss_12
    - loss_21
    - cosine_sim
  
# Override dataset parameters for BGRL pretraining
dataset:
  parameters:
    task: bgrl
    loss_type: bgrl
    monitor_metric: cosine_sim
    task_level: node
