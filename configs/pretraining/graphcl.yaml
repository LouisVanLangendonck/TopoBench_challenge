# @package _global_

# GraphCL Pretraining Configuration
# Contrastive learning with graph augmentations

pretraining:
  enabled: true
  task: graphcl
  transform_suffix: _graphcl

# GraphCL needs its own wrapper (graph augmentations) and readout (projection head).
# Residual connections must be off — the wrapper returns a multi-key dict, not a plain x_0 tensor.
model:
  backbone_wrapper:
    wrapper_name: GraphCLGNNWrapper
    residual_connections: false
  readout:
    readout_name: GraphCLReadOut
    hidden_dim: ${model.feature_encoder.out_channels}
    out_channels: ${model.feature_encoder.out_channels}
    task_level: ${dataset.parameters.task_level}
    pooling_type: sum

# Override loss and evaluator
loss:
  _target_: topobench.loss.TBLoss
  dataset_loss:
    _target_: topobench.loss.dataset.GraphCLLoss
    temperature: 0.1
  modules_losses:
    feature_encoder: ${oc.select:model.feature_encoder.loss,null}
    backbone: ${oc.select:model.backbone.loss,null}
    readout: ${oc.select:model.readout.loss,null}

evaluator:
  _target_: topobench.evaluator.graphcl_evaluator.GraphCLEvaluator
  metrics:
    - contrastive_loss
    - alignment
    - cosine_sim
  
# Override dataset parameters for GraphCL pretraining
dataset:
  parameters:
    task: graphcl
    loss_type: graphcl
    monitor_metric: cosine_sim
    task_level: node
