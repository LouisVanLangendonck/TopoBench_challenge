# @package _global_

# Variational Graph Auto-Encoder (VGAE) Pretraining Configuration
# Unsupervised link prediction via variational inference

pretraining:
  enabled: true
  task: vgae
  transform_suffix: _vgae

# VGAE needs its own wrapper (edge masking + variational encoding) and readout (edge decoder).
# Residual connections must be off — the wrapper returns a multi-key dict, not a plain x_0 tensor.
model:
  backbone_wrapper:
    wrapper_name: VAEGNNWrapper
    residual_connections: false
  readout:
    readout_name: VGAEReadOut
    hidden_dim: ${model.feature_encoder.out_channels}
    out_channels: 1  # binary edge-existence score
    task_level: ${dataset.parameters.task_level}
    pooling_type: sum

# Override loss and evaluator
loss:
  _target_: topobench.loss.TBLoss
  dataset_loss:
    _target_: topobench.loss.dataset.VAELoss
    kl_weight: 0.05
    pos_weight: 1.0
  modules_losses:
    feature_encoder: ${oc.select:model.feature_encoder.loss,null}
    backbone: ${oc.select:model.backbone.loss,null}
    readout: ${oc.select:model.readout.loss,null}

evaluator:
  _target_: topobench.evaluator.vgae_evaluator.VGAEEvaluator
  metrics:
    - loss
    - elbo
    - accuracy
    - auroc
  
# Override dataset parameters for VGAE pretraining
dataset:
  parameters:
    task: vgae
    loss_type: vgae
    monitor_metric: auroc
    task_level: node
