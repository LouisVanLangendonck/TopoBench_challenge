# @package _global_

# Deep Graph Infomax (DGI) Pretraining Configuration
# Maximizes mutual information between node and graph representations

pretraining:
  enabled: true
  task: dgi
  transform_suffix: _dgi

# DGI needs its own wrapper (corruption + dual encoding) and readout (discriminator).
# Residual connections must be off — the wrapper returns a multi-key dict, not a plain x_0 tensor.
model:
  backbone_wrapper:
    wrapper_name: DGIGNNWrapper
    residual_connections: false
  readout:
    readout_name: DGIReadOut
    # hidden_dim is the node-embedding size coming out of the backbone wrapper.
    hidden_dim: ${model.feature_encoder.out_channels}
    out_channels: 1  # binary discrimination score per node
    task_level: ${dataset.parameters.task_level}
    pooling_type: sum

# Override loss and evaluator
loss:
  _target_: topobench.loss.TBLoss
  dataset_loss:
    _target_: topobench.loss.dataset.DGILoss
    loss_type: bce
    reduction: mean
  modules_losses:
    feature_encoder: ${oc.select:model.feature_encoder.loss,null}
    backbone: ${oc.select:model.backbone.loss,null}
    readout: ${oc.select:model.readout.loss,null}

evaluator:
  _target_: topobench.evaluator.dgi_evaluator.DGIEvaluator
  metrics:
    - loss
    - loss_positive
    - loss_negative
    - accuracy
  
# Override dataset parameters for DGI pretraining
dataset:
  parameters:
    task: dgi
    loss_type: dgi
    monitor_metric: accuracy
    task_level: node
