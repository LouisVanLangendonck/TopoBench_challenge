# DGMAE Loss Configuration

_target_: topobench.loss.TBLoss

dataset_loss:
  _target_: topobench.loss.dataset.DGMAELoss
  loss_type: sce  # Options: sce, mse
  alpha_f: 2  # Alpha parameter for SCE loss in feature reconstruction
  alpha_d: 2  # Alpha parameter for SCE loss in discrepancy reconstruction
  lam: 0.5  # Weight for discrepancy loss (0.5 = equal balance)

modules_losses:
  feature_encoder: ${oc.select:model.feature_encoder.loss,null}
  backbone: ${oc.select:model.backbone.loss,null}
  readout: ${oc.select:model.readout.loss,null}


