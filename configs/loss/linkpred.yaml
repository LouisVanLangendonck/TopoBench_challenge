# Link Prediction Loss Configuration

_target_: topobench.loss.TBLoss

dataset_loss:
  _target_: topobench.loss.dataset.LinkPredLoss
  loss_type: bce  # Options: bce, margin, infonce
  margin: 1.0  # Margin for margin-based loss

modules_losses:
  feature_encoder: ${oc.select:model.feature_encoder.loss,null}
  backbone: ${oc.select:model.backbone.loss,null}
  readout: ${oc.select:model.readout.loss,null}


