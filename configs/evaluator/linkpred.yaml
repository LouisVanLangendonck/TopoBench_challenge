# Link Prediction Evaluator Configuration

_target_: topobench.evaluator.linkpred_evaluator.LinkPredEvaluator

# Link Prediction evaluator tracks:
# - auc: Area Under ROC Curve (higher is better)
# - ap: Average Precision (higher is better)
# - hits_at_100: Hits@100 metric (higher is better)
# - mrr: Mean Reciprocal Rank (higher is better)
metrics:
  - auc
  - ap
  - hits_at_100


