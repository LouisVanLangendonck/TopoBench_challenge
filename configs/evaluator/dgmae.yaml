# DGMAE Evaluator Configuration

_target_: topobench.evaluator.dgmae_evaluator.DGMAEEvaluator

# DGMAE evaluator tracks dual-branch metrics:
# - loss_f: Feature reconstruction loss (Branch 1)
# - loss_d: Discrepancy reconstruction loss (Branch 2)
# - cosine_sim_f: Cosine similarity for feature reconstruction (higher is better)
# - cosine_sim_d: Cosine similarity for discrepancy reconstruction (higher is better)
# - total_loss: Combined loss
metrics:
  - loss_f
  - loss_d
  - cosine_sim_f
  - cosine_sim_d


