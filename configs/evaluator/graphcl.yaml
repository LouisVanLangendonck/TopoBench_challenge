# Graph Contrastive Learning (GraphCL) Evaluator Configuration

_target_: topobench.evaluator.graphcl_evaluator.GraphCLEvaluator

# GraphCL evaluator tracks:
# - contrastive_loss: Mean contrastive loss value (lower is better)
# - alignment: Squared L2 distance between positive pairs (lower = better aligned)
# - cosine_sim: Mean cosine similarity between positive pairs (higher is better)
metrics:
  - contrastive_loss
  - alignment
  - cosine_sim

