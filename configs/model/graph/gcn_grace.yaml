_target_: topobench.model.TBModel

model_name: gcn_grace
model_domain: graph

feature_encoder:
  _target_: topobench.nn.encoders.${model.feature_encoder.encoder_name}
  encoder_name: AllCellFeatureEncoder
  in_channels: ${infer_in_channels:${dataset},${oc.select:transforms,null}}
  out_channels: 128
  proj_dropout: 0.1

backbone:
  _target_: torch_geometric.nn.models.GCN
  in_channels: ${model.feature_encoder.out_channels}
  hidden_channels: ${model.feature_encoder.out_channels}
  num_layers: 3
  dropout: 0.3
  act: relu

# Use GRACEGNNWrapper for adaptive augmentation and contrastive learning
backbone_wrapper:
  _target_: topobench.nn.wrappers.GRACEGNNWrapper 
  _partial_: true
  wrapper_name: GRACEGNNWrapper
  out_channels: ${model.feature_encoder.out_channels}
  num_cell_dimensions: ${infer_num_cell_dimensions:${oc.select:model.feature_encoder.selected_dimensions,null},${model.feature_encoder.in_channels}}
  # GRACE-specific parameters - adaptive augmentation with degree centrality
  drop_edge_rate_1: 0.2  # View 1 edge drop rate
  drop_edge_rate_2: 0.4  # View 2 edge drop rate (different for diversity)
  drop_feature_rate_1: 0.1  # View 1 feature mask rate
  drop_feature_rate_2: 0.0  # View 2 feature mask rate
  centrality_measure: degree  # Options: degree, eigenvector, pagerank
  drop_scheme: adaptive  # Options: adaptive, uniform
  threshold: 0.7  # Maximum drop probability

# GRACEReadOut handles the projection head for contrastive learning
readout:
  _target_: topobench.nn.readouts.${model.readout.readout_name}
  readout_name: GRACEReadOut
  num_cell_dimensions: ${infer_num_cell_dimensions:${oc.select:model.feature_encoder.selected_dimensions,null},${model.feature_encoder.in_channels}}
  hidden_dim: ${model.feature_encoder.out_channels}
  out_channels: ${model.feature_encoder.out_channels}  # Projection output dimension
  task_level: ${dataset.parameters.task_level}
  pooling_type: sum
  # GRACE readout specific parameters
  proj_hidden_dim: 256  # Hidden dimension for projection head

# compile model for faster training with pytorch 2.0
compile: false


