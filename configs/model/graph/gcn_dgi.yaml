_target_: topobench.model.TBModel

model_name: gcn_dgi
model_domain: graph

feature_encoder:
  _target_: topobench.nn.encoders.${model.feature_encoder.encoder_name}
  encoder_name: AllCellFeatureEncoder
  in_channels: ${infer_in_channels:${dataset},${oc.select:transforms,null}}
  out_channels: 128
  proj_dropout: 0.0

backbone:
  _target_: torch_geometric.nn.models.GCN
  in_channels: ${model.feature_encoder.out_channels}
  hidden_channels: ${model.feature_encoder.out_channels}
  num_layers: 3
  dropout: 0.2
  act: relu

# Use DGIGNNWrapper for corruption and encoding
backbone_wrapper:
  _target_: topobench.nn.wrappers.DGIGNNWrapper 
  _partial_: true
  wrapper_name: DGIGNNWrapper
  out_channels: ${model.feature_encoder.out_channels}
  num_cell_dimensions: ${infer_num_cell_dimensions:${oc.select:model.feature_encoder.selected_dimensions,null},${model.feature_encoder.in_channels}}
  # DGI-specific parameters
  corruption_type: shuffle  # Options: shuffle, random
  readout_type: mean  # Options: mean, max, sum

# DGIReadOut handles the discriminator
readout:
  _target_: topobench.nn.readouts.${model.readout.readout_name}
  readout_name: DGIReadOut
  num_cell_dimensions: ${infer_num_cell_dimensions:${oc.select:model.feature_encoder.selected_dimensions,null},${model.feature_encoder.in_channels}}
  hidden_dim: ${model.feature_encoder.out_channels}
  out_channels: ${model.feature_encoder.out_channels}
  task_level: ${dataset.parameters.task_level}
  pooling_type: sum
  # DGI readout specific parameters
  discriminator_type: bilinear  # Options: bilinear, mlp

# compile model for faster training with pytorch 2.0
compile: false

