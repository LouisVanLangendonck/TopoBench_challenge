_target_: topobench.model.TBModel

model_name: gcn_graphmae
model_domain: graph

feature_encoder:
  _target_: topobench.nn.encoders.${model.feature_encoder.encoder_name}
  encoder_name: AllCellFeatureEncoder
  in_channels: ${infer_in_channels:${dataset},${oc.select:transforms,null}}
  out_channels: 64
  proj_dropout: 0.0

backbone:
  _target_: torch_geometric.nn.models.GCN
  in_channels: ${model.feature_encoder.out_channels}
  hidden_channels: ${model.feature_encoder.out_channels}
  num_layers: 2
  dropout: 0.0
  act: relu

# Use GraphMAEGNNWrapper for masking and encoding
backbone_wrapper:
  _target_: topobench.nn.wrappers.GraphMAEGNNWrapper 
  _partial_: true
  wrapper_name: GraphMAEGNNWrapper
  out_channels: ${model.feature_encoder.out_channels}
  num_cell_dimensions: ${infer_num_cell_dimensions:${oc.select:model.feature_encoder.selected_dimensions,null},${model.feature_encoder.in_channels}}
  # GraphMAE-specific parameters
  mask_rate: 0.6  # Percentage of nodes to mask
  replace_rate: 0.3  # Percentage of masked nodes to replace with random features
  drop_edge_rate: 0.3  # Percentage of edges to drop during training
  concat_hidden: false  # Whether to concatenate all hidden layers

# GraphMAEReadOut handles the decoder for reconstruction
readout:
  _target_: topobench.nn.readouts.${model.readout.readout_name}
  readout_name: GraphMAEReadOut
  num_cell_dimensions: ${infer_num_cell_dimensions:${oc.select:model.feature_encoder.selected_dimensions,null},${model.feature_encoder.in_channels}}
  hidden_dim: ${model.feature_encoder.out_channels}
  out_channels: ${get_raw_feature_dim:${model.feature_encoder.in_channels}}  # Reconstructs RAW features
  task_level: ${dataset.parameters.task_level}
  pooling_type: sum
  # GraphMAE readout specific parameters
  decoder_type: mlp  # Options: linear, mlp, gnn
  decoder_hidden_dim: 256  # Hidden dimension for MLP decoder
  remask: true  # Whether to re-mask before decoding

# compile model for faster training with pytorch 2.0
compile: false
