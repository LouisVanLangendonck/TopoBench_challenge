_target_: topobench.model.TBModel

model_name: gcn_mvgrl
model_domain: graph

feature_encoder:
  _target_: topobench.nn.encoders.${model.feature_encoder.encoder_name}
  encoder_name: AllCellFeatureEncoder
  in_channels: ${infer_in_channels:${dataset},${oc.select:transforms,null}}
  out_channels: 512
  proj_dropout: 0.0

backbone:
  _target_: torch_geometric.nn.models.GCN
  in_channels: ${model.feature_encoder.out_channels}
  hidden_channels: ${model.feature_encoder.out_channels}
  num_layers: 4
  dropout: 0.0
  act: prelu

# Use MVGRLGNNWrapper for contrastive multi-view learning
# NOTE: MVGRL uses its OWN custom GCN encoders (not the backbone) for JK-Net pooling
# The backbone is kept for TopoBench compatibility but not used
# NOTE: Requires PPRDiffusion or HeatDiffusion transform in preprocessing pipeline
backbone_wrapper:
  _target_: topobench.nn.wrappers.MVGRLGNNWrapper 
  _partial_: true
  wrapper_name: MVGRLGNNWrapper
  # Input/output dimensions
  in_channels: ${model.feature_encoder.out_channels}
  out_channels: ${model.feature_encoder.out_channels}
  num_cell_dimensions: ${infer_num_cell_dimensions:${oc.select:model.feature_encoder.selected_dimensions,null},${model.feature_encoder.in_channels}}
  # MVGRL encoder settings
  num_layers: 4  # Number of GCN layers in each encoder
  # Diffusion edge attributes (set by PPRDiffusion/HeatDiffusion transform)
  diff_edge_index_attr: "edge_index_diff"
  diff_edge_weight_attr: "edge_weight_diff"

# MVGRLReadOut handles graph/node representations
readout:
  _target_: topobench.nn.readouts.${model.readout.readout_name}
  readout_name: MVGRLReadOut
  num_cell_dimensions: ${infer_num_cell_dimensions:${oc.select:model.feature_encoder.selected_dimensions,null},${model.feature_encoder.in_channels}}
  hidden_dim: ${model.feature_encoder.out_channels}
  out_channels: ${dataset.parameters.num_classes}
  task_level: ${dataset.parameters.task_level}

# compile model for faster training with pytorch 2.0
compile: false
