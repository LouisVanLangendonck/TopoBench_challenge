_target_: topobench.model.TBModel

model_name: gcn_graphmaev2
model_domain: graph

feature_encoder:
  _target_: topobench.nn.encoders.${model.feature_encoder.encoder_name}
  encoder_name: AllCellFeatureEncoder
  in_channels: ${infer_in_channels:${dataset},${oc.select:transforms,null}}
  out_channels: 256
  proj_dropout: 0.1

backbone:
  _target_: torch_geometric.nn.models.GCN
  in_channels: ${model.feature_encoder.out_channels}
  hidden_channels: ${model.feature_encoder.out_channels}
  num_layers: 3
  dropout: 0.3
  act: relu

# Use GraphMAEv2GNNWrapper for masking, EMA encoder, and latent loss
backbone_wrapper:
  _target_: topobench.nn.wrappers.GraphMAEv2GNNWrapper 
  _partial_: true
  wrapper_name: GraphMAEv2GNNWrapper
  out_channels: ${model.feature_encoder.out_channels}
  num_cell_dimensions: ${infer_num_cell_dimensions:${oc.select:model.feature_encoder.selected_dimensions,null},${model.feature_encoder.in_channels}}
  # GraphMAEv2-specific parameters - challenging but trainable
  mask_rate: 0.75  # High masking: forces model to learn from limited info
  replace_rate: 0.0  # No replacement: cleaner signal for learning
  drop_edge_rate: 0.2  # Moderate edge dropout: forces robustness to structure
  momentum: 0.996  # Standard EMA momentum
  delayed_ema_epoch: 0  # Start EMA immediately
  lam: 1.0  # Balance between reconstruction and latent matching

# GraphMAEv2ReadOut handles the decoder with re-masking
readout:
  _target_: topobench.nn.readouts.${model.readout.readout_name}
  readout_name: GraphMAEv2ReadOut
  num_cell_dimensions: ${infer_num_cell_dimensions:${oc.select:model.feature_encoder.selected_dimensions,null},${model.feature_encoder.in_channels}}
  hidden_dim: ${model.feature_encoder.out_channels}
  out_channels: ${get_raw_feature_dim:${model.feature_encoder.in_channels}}  # CRITICAL: Must match RAW feature dim
  task_level: ${dataset.parameters.task_level}
  pooling_type: sum
  # GraphMAEv2 readout specific parameters - aggressive for challenge
  decoder_type: mlp  # MLP for non-linear reconstruction
  decoder_hidden_dim: 512  # Large hidden layer for complex inverse mapping
  num_remasking: 5  # More re-masks for robustness
  remask_rate: 0.6  # Higher re-masking rate for harder task
  remask_method: random  # Random keeps it challenging

# compile model for faster training with pytorch 2.0
compile: false

