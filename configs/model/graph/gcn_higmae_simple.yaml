# Simplified Hi-GMAE with GCN backbone (num_levels=1, essentially flat MAE)
# This serves as a baseline to debug hierarchical issues

_target_: topobench.model.TBModel

feature_encoder:
  _target_: topobench.nn.encoders.AllCellEncoder
  in_channels: ${infer_in_channels:${dataset.parameters}}
  out_channels: 256
  selected_dimensions: null

backbone:
  _target_: topobench.nn.backbones.graph.GCNBackbone
  in_channels: ${model.feature_encoder.out_channels}
  hidden_channels: 256
  out_channels: 256
  num_layers: 3
  dropout: 0.1
  use_bn: true

backbone_wrapper:
  _target_: topobench.nn.wrappers.graph.HiGMAEGNNWrapper
  _partial_: true
  num_cell_dimensions: ${infer_num_cell_dimensions:${oc.select:model.feature_encoder.selected_dimensions,null},${model.feature_encoder.in_channels}}
  residual_connections: false  # Disable residual connections due to hierarchical coarsening
  num_levels: 1  # SIMPLIFIED: Just 1 level (flat MAE)
  mask_rate: 0.25
  coarsening_ratio: 0.5
  recover_rate: 0.0
  gamma: 0.5
  out_channels: ${model.backbone.out_channels}

readout:
  _target_: topobench.nn.readouts.HiGMAEReadOut
  hidden_dim: ${model.backbone.out_channels}
  out_channels: ${dataset.parameters.num_features}
  num_levels: ${model.backbone_wrapper.num_levels}
  decoder_type: mlp
  decoder_hidden_dim: 128
  task_level: node

# compile model for faster training with pytorch 2.0
compile: false

