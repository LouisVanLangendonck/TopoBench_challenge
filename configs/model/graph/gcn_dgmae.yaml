_target_: topobench.model.TBModel

model_name: gcn_dgmae
model_domain: graph

feature_encoder:
  _target_: topobench.nn.encoders.${model.feature_encoder.encoder_name}
  encoder_name: AllCellFeatureEncoder
  in_channels: ${infer_in_channels:${dataset},${oc.select:transforms,null}}
  out_channels: 128
  proj_dropout: 0.1

backbone:
  _target_: torch_geometric.nn.models.GCN
  in_channels: ${model.feature_encoder.out_channels}
  hidden_channels: ${model.feature_encoder.out_channels}
  num_layers: 3
  dropout: 0.3
  act: relu

# Use DGMAEGNNWrapper for masking and heterophily-aware features
backbone_wrapper:
  _target_: topobench.nn.wrappers.DGMAEGNNWrapper 
  _partial_: true
  wrapper_name: DGMAEGNNWrapper
  out_channels: ${model.feature_encoder.out_channels}
  num_cell_dimensions: ${infer_num_cell_dimensions:${oc.select:model.feature_encoder.selected_dimensions,null},${model.feature_encoder.in_channels}}
  # DGMAE-specific parameters
  mask_rate: 0.5
  replace_rate: 0.0
  drop_edge_rate: 0.0
  hop: 2  # Hops for high-pass filter
  in_channels: ${dataset.parameters.num_features}  # Input dim for MLP output
  encoder_type: gcn  # GCN doesn't have attention

# DGMAEReadOut handles the decoder
readout:
  _target_: topobench.nn.readouts.${model.readout.readout_name}
  readout_name: DGMAEReadOut
  num_cell_dimensions: ${infer_num_cell_dimensions:${oc.select:model.feature_encoder.selected_dimensions,null},${model.feature_encoder.in_channels}}
  hidden_dim: ${model.feature_encoder.out_channels}
  out_channels: ${dataset.parameters.num_features}  # Reconstructs RAW features
  task_level: ${dataset.parameters.task_level}
  pooling_type: sum
  # DGMAE readout specific parameters
  decoder_type: mlp
  decoder_hidden_dim: 256

# compile model for faster training with pytorch 2.0
compile: false
