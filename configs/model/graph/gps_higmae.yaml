# Hi-GMAE Model Configuration with GPS backbone

_target_: topobench.model.TBModel

model_name: gps_higmae

feature_encoder:
  _target_: topobench.nn.encoders.AllCellFeatureEncoder
  out_channels: 256
  in_channels: ${infer_in_channels:${dataset},${transforms}}
  proj_dropout: 0.1

backbone:
  _target_: topobench.nn.backbones.GPSEncoder
  input_dim: ${model.feature_encoder.out_channels}
  hidden_dim: ${model.feature_encoder.out_channels}
  num_layers: 2
  dropout: 0.2
  heads: 2
  attn_type: multihead
  local_conv_type: gin

backbone_wrapper:
  _target_: topobench.nn.wrappers.graph.HiGMAEGNNWrapper
  _partial_: true
  num_cell_dimensions: ${infer_num_cell_dimensions:${oc.select:model.feature_encoder.selected_dimensions,null},${model.feature_encoder.in_channels}}
  residual_connections: false  # Disable residual connections due to hierarchical coarsening
  num_levels: 2
  mask_rate: 0.25
  coarsening_ratio: 0.2
  recover_rate: 0.0
  gamma: 0.5
  out_channels: ${model.backbone.hidden_dim}

readout:
  _target_: topobench.nn.readouts.HiGMAEReadOut
  hidden_dim: ${model.backbone.hidden_dim}
  out_channels: ${dataset.parameters.num_features}
  num_levels: ${model.backbone_wrapper.num_levels}
  decoder_type: mlp
  decoder_hidden_dim: 128
  task_level: node

# compile model for faster training with pytorch 2.0
compile: false

