
loader:
  _target_: topobench.data.loaders.GraphUniverse2DatasetLoader
  parameters:
    data_domain: graph
    data_type: GraphUniverse2
    data_name: GraphUniverse2_community_counts
    data_dir: ${paths.data_dir}/${dataset.loader.parameters.data_domain}/${dataset.loader.parameters.data_type}
    generation_parameters:
      task: community_counting
      universe_parameters:
        K: 20
        feature_dim: 15
        center_variance: 0.2
        cluster_variance: 0.5
        edge_propensity_variance: 0.5
        co_occurrence_variance: 0.5
        seed: 42
      family_parameters:
        n_graphs: 500
        n_nodes_range: [30, 50]
        n_communities_range: [3, 10]
        homophily_range: [0.0, 1.0]
        avg_degree_range: [2.0, 3.0]
        degree_separation_range: [0.5, 1.0]
        abundance_separation_range: [0.8, 1.0]
        power_law_exponent_range: [1.5, 2.5]
        seed: ${dataset.loader.parameters.generation_parameters.universe_parameters.seed}

parameters:
  num_features: ${dataset.loader.parameters.generation_parameters.universe_parameters.feature_dim}
  num_classes: ${dataset.loader.parameters.generation_parameters.universe_parameters.K}
  task: regression
  loss_type: mae
  monitor_metric: mae
  task_level: graph

split_params:
  learning_setting: inductive
  data_split_dir: ${dataset.loader.parameters.data_dir}/data_splits
  data_seed: 0
  split_type: random
  k: 10
  train_prop: 0.7

dataloader_params:
  batch_size: 32
  num_workers: 0
  pin_memory: False
