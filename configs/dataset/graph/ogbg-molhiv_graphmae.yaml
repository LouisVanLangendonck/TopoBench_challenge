
loader:
  _target_: topobench.data.loaders.OGBGDatasetLoader
  parameters: 
    data_domain: graph
    data_type: OGBGDataset
    data_name: ogbg-molhiv
    data_dir: ${paths.data_dir}/${dataset.loader.parameters.data_domain}/${dataset.loader.parameters.data_type}

# Dataset parameters
parameters:
  num_features: 9
  num_classes: 2
  task: graphmae
  loss_type: sce
  monitor_metric: recon_loss
  task_level: node  # GraphMAE does node-level reconstruction

#splits
split_params:
  learning_setting: inductive
  data_split_dir: ${paths.data_dir}/data_splits/${dataset.loader.parameters.data_name}
  data_seed: 0
  split_type: "fixed" #'k-fold' # either "k-fold" or "random" strategies
  k: 10 # for "k-fold" Cross-Validation
  train_prop: 0.5 # for "random" strategy splitting

# Dataloader parameters
dataloader_params:
  batch_size: 64 
  num_workers: 0
  pin_memory: False



