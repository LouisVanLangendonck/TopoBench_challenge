
loader:
  _target_: topobench.data.loaders.GraphUniverseDatasetLoader
  parameters: 
    data_domain: graph
    data_type: GraphUniverse
    data_name: GraphUniverse_LinkPred_Transductive
    data_dir: ${paths.data_dir}/${dataset.loader.parameters.data_domain}/${dataset.loader.parameters.data_type}
    generation_parameters:
      task: community_detection
      universe_parameters:
        K: 10
        feature_dim: 15
        center_variance: 0.2
        cluster_variance: 0.5
        edge_propensity_variance: 0.5
        seed: 42
      family_parameters:
        n_graphs: 1
        min_n_nodes: 5000
        max_n_nodes: 5000
        min_communities: 10
        max_communities: 10
        homophily_range: [0.5, 0.5]
        avg_degree_range: [2.5, 2.5]
        degree_separation_range: [0.5, 0.5]
        degree_distribution: power_law
        power_law_exponent_range: [2.5, 2.5]
        seed: ${dataset.loader.parameters.generation_parameters.universe_parameters.seed}
    

# Dataset parameters
parameters:
  num_features: ${dataset.loader.parameters.generation_parameters.universe_parameters.feature_dim}
  num_classes: 1  # Binary classification (edge exists or not)
  task: linkpred
  monitor_metric: accuracy  # Track accuracy for link prediction
  task_level: node  # Node-level embeddings, combined in readout for edge prediction

#splits
split_params:
  learning_setting: transductive
  data_split_dir: ${dataset.loader.parameters.data_dir}/data_splits
  data_seed: 0
  split_type: random #'k-fold' # either "k-fold" or "random" strategies
  k: 10 # for "k-fold" Cross-Validation
  train_prop: 0.7 # for "random" strategy splitting

# Dataloader parameters
dataloader_params:
  batch_size: 1  # Single graph in transductive setting
  num_workers: 0
  pin_memory: False



